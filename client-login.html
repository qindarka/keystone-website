<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login — Keystone Technologies</title>
  <meta name="description" content="Sign in to the Keystone Technologies client portal to submit tickets, view invoices, and access documentation." />
  <meta name="theme-color" content="#004876" />
  <link rel="icon" type="image/svg+xml" href="/assets/images/keystone.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    .auth-wrap {
      min-height: calc(100vh - 0px);
      display: grid;
      place-items: center;
      background:
        radial-gradient(900px 500px at 80% 0%, rgba(255, 184, 25, 0.18), transparent 60%),
        linear-gradient(135deg, var(--navy-darker) 0%, var(--navy) 100%);
      padding: 60px 20px;
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 460px;
      width: 100%;
      padding: 44px 40px;
    }
    .auth-card .brand-row { text-align: center; margin-bottom: 28px; }
    .auth-card .brand-row img { height: 42px; margin: 0 auto; }
    .auth-card h1 { font-size: 1.6rem; text-align: center; margin-bottom: 6px; }
    .auth-card .sub { text-align: center; color: var(--slate); margin-bottom: 28px; font-size: 0.95rem; }
    .auth-card .form-grid { grid-template-columns: 1fr; gap: 14px; margin-bottom: 14px; }
    .auth-foot {
      text-align: center;
      margin-top: 22px;
      font-size: 0.88rem;
      color: var(--slate);
    }
    .auth-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 20px;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .auth-back:hover { color: var(--gold); }
    .badge-row {
      display: flex; gap: 8px; justify-content: center; margin-top: 18px;
      font-size: 0.78rem; color: var(--slate);
    }
    .badge-row span { display: inline-flex; align-items: center; gap: 4px; }
    .badge-row svg { width: 14px; height: 14px; color: var(--navy); }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div style="max-width:460px; width:100%;">
    <a href="/" class="auth-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to keystonetech.ca
    </a>
    <div class="auth-card">
      <div class="brand-row"><img src="/assets/images/keystone.svg" alt="Keystone Technologies" /></div>
      <h1>Client Login</h1>
      <p class="sub">Submit tickets, review invoices and access your environment.</p>
      <form action="#" method="post">
        <div class="form-grid">
          <div class="field">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" required autocomplete="username" />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Sign in</button>
      </form>
      <div class="auth-foot">
        <a href="/contact.html?topic=Account">Forgot your password?</a>
        <div style="margin-top: 10px;">
          Don't have an account yet? <a href="/contact.html">Talk to us</a>
        </div>
      </div>
      <div class="badge-row">
        <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Encrypted</span>
        <span>&middot;</span>
        <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> MFA enforced</span>
      </div>
    </div>
  </div>
</div>

<script src="/assets/js/main.js" defer></script>
</body>
</html>
