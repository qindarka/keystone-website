<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Login — Keystone Technologies</title>
  <meta name="description" content="Sign in to internal Keystone Technologies tools and resources." />
  <meta name="theme-color" content="#004876" />
  <link rel="icon" type="image/svg+xml" href="/assets/images/keystone.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(900px 500px at 20% 100%, rgba(255, 184, 25, 0.18), transparent 60%),
        linear-gradient(135deg, #001b30 0%, var(--navy-darker) 100%);
      padding: 60px 20px;
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 460px;
      width: 100%;
      padding: 44px 40px;
    }
    .auth-card .brand-row { text-align: center; margin-bottom: 28px; }
    .auth-card .brand-row img { height: 42px; margin: 0 auto; }
    .auth-card h1 { font-size: 1.6rem; text-align: center; margin-bottom: 6px; }
    .auth-card .sub { text-align: center; color: var(--slate); margin-bottom: 28px; font-size: 0.95rem; }
    .auth-card .form-grid { grid-template-columns: 1fr; gap: 14px; margin-bottom: 14px; }
    .auth-foot { text-align: center; margin-top: 22px; font-size: 0.88rem; color: var(--slate); }
    .auth-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.85); margin-bottom: 20px;
      font-size: 0.9rem; font-weight: 600;
    }
    .auth-back:hover { color: var(--gold); }
    .sso-btn {
      display: flex; width: 100%; align-items: center; justify-content: center; gap: 10px;
      padding: 12px 16px; border-radius: 10px; border: 1.5px solid var(--line);
      background: var(--white); color: var(--ink); font-weight: 600; font-size: 0.95rem;
      cursor: pointer; transition: all 0.2s var(--ease);
    }
    .sso-btn:hover { border-color: var(--navy); background: var(--mist); }
    .sso-btn svg { width: 18px; height: 18px; }
    .divider {
      display: flex; align-items: center; gap: 12px; margin: 22px 0;
      color: var(--slate); font-size: 0.82rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }
    .restricted {
      background: rgba(255, 184, 25, 0.12); border-left: 3px solid var(--gold);
      padding: 10px 14px; border-radius: 6px; font-size: 0.82rem; color: var(--ink);
      margin-top: 16px;
    }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div style="max-width:460px; width:100%;">
    <a href="/" class="auth-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to keystonetech.ca
    </a>
    <div class="auth-card">
      <div class="brand-row"><img src="/assets/images/keystone.svg" alt="Keystone Technologies" /></div>
      <h1>Employee Login</h1>
      <p class="sub">Internal tools, runbooks and team resources.</p>

      <button type="button" class="sso-btn">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="9" height="9" fill="#F25022"/>
          <rect x="13" y="2" width="9" height="9" fill="#7FBA00"/>
          <rect x="2" y="13" width="9" height="9" fill="#00A4EF"/>
          <rect x="13" y="13" width="9" height="9" fill="#FFB900"/>
        </svg>
        Continue with Microsoft 365
      </button>

      <div class="divider">or with email</div>

      <form action="#" method="post">
        <div class="form-grid">
          <div class="field">
            <label for="email">Work email</label>
            <input id="email" name="email" type="email" required autocomplete="username" />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Sign in</button>
      </form>

      <div class="restricted">
        <strong>Restricted access.</strong> This portal is for Keystone Technologies staff only. All access is logged and monitored.
      </div>

      <div class="auth-foot">
        <a href="mailto:it@keystonetech.ca?subject=Password%20reset">Reset password</a> &middot; <a href="mailto:it@keystonetech.ca">Need help?</a>
      </div>
    </div>
  </div>
</div>

<script src="/assets/js/main.js" defer></script>
</body>
</html>
